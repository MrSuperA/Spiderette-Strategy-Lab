repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
  # 本地 hook: 自动同步项目结构文档
  - repo: local
    hooks:
      - id: sync-project-structure
        name: sync project structure docs
        entry: python tools/sync_docs.py
        language: system
        pass_filenames: false
        always_run: true
